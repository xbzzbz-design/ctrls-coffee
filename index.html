  top: 0; left: 0; right: 0;
  z-index: 9999;
  background: #c0392b;
  color: #fff;
  font-family: var(--mono, monospace);
  font-size: 12px;
  line-height: 1.3;
  text-align: center;
  padding: 7px 12px;
  cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,0.25);
}

/* === Order send status (read-after-write confirmation) === */
.order-sync {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%);
  z-index: 10000;
  max-width: 90vw;
  padding: 10px 16px;
  border-radius: 999px;
  font-family: var(--mono, monospace);
  font-size: 13px;
  line-height: 1.35;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.22);
}
.order-sync-sending { background: #34495e; color: #fff; }
.order-sync-sent    { background: #2e7d32; color: #fff; }
.order-sync-failed  { background: #c0392b; color: #fff; }
.order-sync-offline { background: #b9770e; color: #fff; }
.order-sync-retry {
  margin-left: 8px;
  border: 1px solid rgba(255,255,255,0.7);
  background: transparent;
  color: #fff;
  border-radius: 999px;
  padding: 2px 10px;
  font: inherit;
  cursor: pointer;
}

/* === Sync status dot (shown when connection is healthy) === */
.sync-dot {
  position: fixed;
  top: 8px;
  right: 10px;
  z-index: 9998;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px 3px 7px;
  border-radius: 999px;
  font-family: var(--mono, monospace);
  font-size: 10px;
  line-height: 1;
  background: rgba(0,0,0,0.06);
  color: var(--brown, #6b5545);
  pointer-events: none;
}
.sync-dot-led {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #2e7d32;
  box-shadow: 0 0 0 0 rgba(46,125,50,0.5);
  animation: sync-pulse 2.4s ease-out infinite;
}
.sync-dot-connecting .sync-dot-led {
  background: #b9770e;
  animation: none;
}
@keyframes sync-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(46,125,50,0.45); }
  70%  { box-shadow: 0 0 0 6px rgba(46,125,50,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,125,50,0); }
}

/* === PWA Install Banner === */
.install-banner {
  position: fixed;
  bottom: 16px;
  left: 12px;
  right: 12px;
  z-index: 9990;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream, #F6F1E8);
  border: 1.5px solid var(--mustard, #c8a165);
  border-radius: 16px;
  padding: 12px 10px 12px 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  animation: install-slide-up 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes install-slide-up {
  from { transform: translateY(110%); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.install-banner-icon {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}
.install-banner-text {
  flex: 1;
  min-width: 0;
}
.install-banner-btn {
  flex-shrink: 0;
  background: var(--mustard, #c8a165);
  color: var(--cream, #F6F1E8);
  border: none;
  border-radius: 999px;
  padding: 7px 14px;
  font-family: var(--mono, monospace);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.install-banner-close {
  flex-shrink: 0;
  background: none;
  border: none;
  color: var(--brown-light, #a08060);
  font-size: 14px;
  padding: 4px 6px;
  cursor: pointer;
  line-height: 1;
}

/* === Loading / Error screens === */
.loading-screen {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--cream, #F6F1E8);
  padding: 32px;
  text-align: center;
}

/* === "Miss a bean?" — vote to bring back sold-out roasts === */
.missed-section {
  margin-top: 4px;
  opacity: 0.78;
  filter: grayscale(0.5);
}
.missed-bean {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
}
.missed-bean:last-child { border-bottom: none; }
.missed-bar {
  height: 5px;
  background: var(--line);
  border-radius: 999px;
  margin: 5px 0 3px;
  overflow: hidden;
}
.missed-fill {
  height: 100%;
  background: var(--terracotta);
  border-radius: 999px;
  transition: width 0.3s;
}
.missed-name { color: var(--brown-light); }
.missed-tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--line);
  color: var(--brown);
  vertical-align: middle;
  margin-left: 4px;
}

/* === Team question (signup) === */
.team-ask { margin-top: 12px; }
.team-pills { display: flex; gap: 8px; }
.team-pill {
  flex: 1;
  padding: 9px 10px;
  border: 1.5px solid var(--line);
  border-radius: 12px;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-mono, monospace);
  font-size: 12px;
  color: var(--brown);
  transition: all 0.15s;
}
.team-pill.on {
  border-color: var(--mustard);
  background: var(--mustard);
  color: var(--cream);
  font-weight: 600;
}
.outteam-box { margin-top: 8px; }

/* === Out-of-team LINE ID badge (barista back-office) === */
.lineid-badge {
  display: inline-block;
  margin-top: 3px;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--terracotta-soft);
  color: var(--terracotta);
  font-weight: 600;
}

/* === Café lounge — cats strolling around the café === */
.cafe-section { position: relative; }
.cafe-strip {
  position: relative;
  height: 84px;
  overflow: hidden;
  border-radius: 14px;
  /* café interior: warm wall + soft window light */
  background:
    radial-gradient(120px 60px at 18% 24%, rgba(255,250,235,0.7), transparent 70%),
    radial-gradient(120px 60px at 78% 20%, rgba(255,250,235,0.55), transparent 70%),
    linear-gradient(180deg, #E8D6BC 0%, #E2CBA8 55%, #D8BD96 100%);
}
/* back wall decor: windows + hanging menu board (pure CSS, behind cats) */
.cafe-strip::before {
  content: "";
  position: absolute;
  left: 0; right: 0; top: 8px; height: 34px;
  background:
    /* two windows */
    linear-gradient(#BFE0E8, #BFE0E8) 12% 0/40px 26px no-repeat,
    linear-gradient(#BFE0E8, #BFE0E8) 70% 0/40px 26px no-repeat;
  opacity: 0.7;
  border-radius: 4px;
}
.cafe-strip::after {
  content: "☕ MENU";
  position: absolute;
  top: 7px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono, monospace);
  font-size: 8px;
  letter-spacing: 1px;
  color: #6B5540;
  background: #C9A877;
  padding: 2px 8px;
  border-radius: 3px;
  box-shadow: 0 2px 0 #A8865A, 0 6px 4px rgba(0,0,0,0.12);
}
.cafe-lane {
  position: absolute;
  inset: 0;
  bottom: 12px;
  z-index: 2;
}
.cafe-floorline {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 12px;
  z-index: 1;
  background:
    repeating-linear-gradient(90deg, #B98E5E 0 16px, #AD8253 16px 32px);
  box-shadow: inset 0 3px 4px rgba(0,0,0,0.15);
}
.cafe-walker {
  position: absolute;
  bottom: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  will-change: transform;
}
.cafe-walker.rtl { animation: cafe-walk-rtl 11s linear infinite; }
.cafe-walker.ltr { animation: cafe-walk-ltr 11s linear infinite; }
/* "you" stand by the counter instead of strolling */
.cafe-walker.standing {
  animation: none;
  left: 10px;
  z-index: 2;
}
.cafe-walker.standing .cat-bob {
  animation: cafe-idle 2.6s ease-in-out infinite;
}
@keyframes cafe-idle {
  0%, 100% { transform: translateY(0) rotate(-1.5deg); }
  50%      { transform: translateY(-1.5px) rotate(1.5deg); }
}
@keyframes cafe-walk-rtl {
  from { transform: translateX(100vw); }
  to   { transform: translateX(-72px); }
}
@keyframes cafe-walk-ltr {
  from { transform: translateX(-72px); }
  to   { transform: translateX(100vw); }
}
/* face the walking direction */
.cafe-walker.ltr .cat-bob { transform: scaleX(-1); }
/* every cat bobs + waddles while walking — cute stroll */
.cafe-walker .cat-bob {
  display: inline-block;
  animation: cafe-waddle 0.5s ease-in-out infinite;
  transform-origin: 50% 90%;
}
.cafe-walker.ltr .cat-bob { animation-name: cafe-waddle-flip; }
@keyframes cafe-waddle {
  0%   { transform: translateY(0) rotate(-4deg); }
  50%  { transform: translateY(-3px) rotate(4deg); }
  100% { transform: translateY(0) rotate(-4deg); }
}
@keyframes cafe-waddle-flip {
  0%   { transform: scaleX(-1) translateY(0) rotate(-4deg); }
  50%  { transform: scaleX(-1) translateY(-3px) rotate(4deg); }
  100% { transform: scaleX(-1) translateY(0) rotate(-4deg); }
}
.cafe-name {
  font-size: 9px;
  max-width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 1px;
  color: #5A4632;
  font-weight: 600;
}
.cafe-walker.me .cafe-name {
  background: var(--mustard);
  color: var(--cream);
  border-radius: 999px;
  padding: 0 6px;
}
.cafe-hint {
  font-size: 10px;
  text-align: center;
  margin-top: 6px;
}

<script>
// CTRL+S — shared data model used by all prototypes
// Persisted to localStorage by default, with optional Supabase sync for
// sharing orders between customer + barista devices.

(function () {
  const STORAGE_KEY = 'ctrls_v2';

  // === Default data ===
  const DEFAULT_OPEN_DAYS = [1, 3, 5]; // Mon, Wed, Fri
  const DEFAULT_CLOSED_DATES = [];
  const DEFAULT_OPEN_DATES = [];
  const COLOR_OPTIONS = ['mustard', 'pink', 'terracotta', 'sage', 'charcoal'];
  const ROAST_ORDER = { light: 0, medium: 1, dark: 2, 'non-coffee': 3 };
  const ROAST_OPTIONS = ['light', 'medium', 'dark', 'non-coffee'];

  const DEFAULT_SIGNATURE_MENU = [
    {
      id: 'approve',
      name: 'Approve',
      mood: '👍',
      roast: 'medium',
      available: true,
      price: 40,
      color: 'mustard',
      catStyle: 'star',
      tag: 'vanilla forward / buttery / caramel-ish',
      tagline: "Bitter but sweet at the end. Like waiting 6 hrs for a one-word: 'APPROVE.'",
    },
    {
      id: 'wfh',
      name: 'WFH',
      mood: '❤️',
      roast: 'medium',
      available: true,
      price: 40,
      color: 'pink',
      catStyle: 'happy',
      tag: 'floral / soft sweet / easygoing',
      tagline: 'Cozy enough to feel like WFH and 2PM is your nap time.',
    },
  ];

  const DEFAULT_ASAP = [
    { id: 'a1', name: 'Strawberry', roast: 'light', available: true, price: 60, notes: 'Bright and juicy like freshly picked strawberries. Sparkling finish.' },
    { id: 'a2', name: 'Chrysanthemum', roast: 'light', available: true, price: 60, notes: 'Floral and calming like a cup of chrysanthemum tea. Gently sweet.' },
    { id: 'a3', name: 'French Toast', roast: 'medium', available: true, price: 60, notes: 'Warm and buttery with hints of maple syrup. Comforting like Sunday morning.' },
    { id: 'a4', name: 'Tiramisu', roast: 'medium', available: true, price: 60, notes: 'Creamy and smooth with notes of cocoa and mascarpone.' },
    { id: 'a5', name: 'Choco Biscuit Nutty', roast: 'medium', available: true, price: 40, notes: 'Nutty and chocolatey with a buttery biscuit vibe. Super drinkable.' },
    { id: 'a6', name: 'Whisky Rum', roast: 'medium', available: true, price: 60, notes: 'Deep and boozy with a touch of whisky and rum. Bold and sophisticated.' },
    { id: 'a7', name: 'Inferno Dark Chocolate', roast: 'dark', available: true, price: 40, notes: 'Intense smoky, roasty, burnt notes in deep dark chocolate. Unapologetically dark.' },
  ];

  function seedOrders() {
    // Find the next 2 open days from today so demo faces always appear in the week view
    const today = new Date();
    const opens = [];
    for (let i = 0; i < 60 && opens.length < 2; i++) {
      const d = new Date(today); d.setDate(today.getDate() + i);
      if (DEFAULT_OPEN_DAYS.includes(d.getDay())) opens.push(isoDate(d));
    }
    const d1 = opens[0] || isoDate(today);
    const d2 = opens[1] || d1;
    return [
      { id: 'demo-1', name: 'Pim', date: d1, items: [{ type: 'menu', refId: 'wfh', qty: 1 }], status: 'queued', paid: 'paid', note: '', ts: Date.now() - 1000 * 60 * 30, avatar: { body: 'rosy', accent: 'pink', expression: 'happy', prop: 'bow' } },
      { id: 'demo-2', name: 'Top', date: d1, items: [{ type: 'asap', refId: 'a4', qty: 1 }, { type: 'menu', refId: 'approve', qty: 1 }], status: 'brewing', paid: 'paid', note: 'less ice plz', ts: Date.now() - 1000 * 60 * 12, avatar: { body: 'beige', accent: 'mustard', expression: 'sparkle', prop: 'glasses' } },
      { id: 'demo-3', name: 'Earn', date: d2, items: [{ type: 'asap', refId: 'a7', qty: 1 }], status: 'done', paid: 'paid', note: '', ts: Date.now() - 1000 * 60 * 60 * 2, avatar: { body: 'caramel', accent: 'terracotta', expression: 'smug', prop: 'sunglasses' } },
    ];
  }

  const DEFAULT_STATE = {
    openDays: DEFAULT_OPEN_DAYS,
    closedDates: DEFAULT_CLOSED_DATES,
    openDates: DEFAULT_OPEN_DATES,
    signatureMenu: DEFAULT_SIGNATURE_MENU,
    asap: DEFAULT_ASAP,
    orders: [],
    subscriptions: [],
    gifts: [],
    profiles: {}, // fake shared store · code → profile
    peopleMeta: {}, // profileId -> { hiddenFromGift, deleted }
    beanLove: {}, // asapId -> [profileId] · votes to bring back sold-out beans
    barista: { name: 'Boss', shopName: 'CTRL+S Coffee', promptPay: '081-234-5678', baristaPin: '1337', featuredAsap: null, outOfTeamSurcharge: 20, todayNote: { enabled: false, title: "today's note", body: '' } },
  };

  function load() { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
  function save(_state) {} // state lives in Supabase — localStorage no longer used as primary store

  // === Optional Supabase shared state ===
  const DEFAULT_REMOTE_CONFIG = { url: '', anonKey: '', table: 'ctrls_state', rowId: 'main' };
  let remoteClientCache = null;
  let remoteClientKey = '';

  function remoteConfig() {
    const cfg = { ...DEFAULT_REMOTE_CONFIG, ...(window.CTRLS_SUPABASE || {}) };
    try {
      const saved = JSON.parse(localStorage.getItem('ctrls_supabase_config') || '{}');
      Object.assign(cfg, saved || {});
    } catch {}
    cfg.table = cfg.table || DEFAULT_REMOTE_CONFIG.table;
    cfg.rowId = cfg.rowId || DEFAULT_REMOTE_CONFIG.rowId;
    return cfg;
  }

  function remoteEnabled() {
    const cfg = remoteConfig();
    return Boolean(cfg.url && cfg.anonKey && window.supabase && window.supabase.createClient);
  }

  function remoteClient() {
    const cfg = remoteConfig();
    if (!remoteEnabled()) return null;
    const key = `${cfg.url}|${cfg.anonKey}`;
    if (!remoteClientCache || remoteClientKey !== key) {
      remoteClientCache = window.supabase.createClient(cfg.url, cfg.anonKey);
      remoteClientKey = key;
    }
    return remoteClientCache;
  }

  function normalizeState(state) {
    return {
      ...JSON.parse(JSON.stringify(DEFAULT_STATE)),
      ...(state || {}),
      orders: Array.isArray(state?.orders) ? state.orders : [],
      subscriptions: Array.isArray(state?.subscriptions) ? state.subscriptions : [],
      gifts: Array.isArray(state?.gifts) ? state.gifts : [],
      profiles: state?.profiles || {},
      peopleMeta: state?.peopleMeta || {},
      beanLove: state?.beanLove || {},
      barista: { ...DEFAULT_STATE.barista, ...(state?.barista || {}) },
    };
  }

  function adoptRemoteState(localState, remoteState) {
    const local = normalizeState(localState);
    const remote = normalizeState(remoteState);
    const code = activeCode();
    if (code && local.profiles?.[code] && !remote.profiles?.[code]) {
      remote.profiles = { ...remote.profiles, [code]: local.profiles[code] };
    }
    return remote;
  }

  async function pullRemoteState() {
    const client = remoteClient();
    const cfg = remoteConfig();
    if (!client) throw new Error('Supabase client not available');

    const { data, error } = await client
      .from(cfg.table)
      .select('state')
      .eq('id', cfg.rowId)
      .maybeSingle();

    if (error) throw error;
    if (!data) {
      const initial = normalizeState({});
      await pushRemoteState(initial);
      return { state: initial, created: true };
    }
    return { state: normalizeState(data.state), created: false };
  }

  async function pushRemoteState(state) {
    const client = remoteClient();
    const cfg = remoteConfig();
    if (!client) return { ok: false };
    const payload = {
      id: cfg.rowId,
      state: normalizeState(state),
      updated_at: new Date().toISOString(),
    };
    const { error } = await client.from(cfg.table).upsert(payload, { onConflict: 'id' });
    if (error) throw error;
    return { ok: true };
  }

  // Read-after-write confirmation. MERGES the given new orders into the LATEST
  // remote state (never overwrites other people's data), pushes, then reads it
  // back to confirm the ids actually landed. Returns { ok, missing, reason }.
  async function confirmOrders(localState, orderIds) {
    const client = remoteClient();
    const cfg = remoteConfig();
    if (!client) return { ok: false, reason: 'offline', missing: orderIds || [] };
    const ids = orderIds || [];
    // 1) Pull the freshest remote so we don't clobber other devices' orders.
    const { data: current, error: pullErr } = await client
      .from(cfg.table).select('state').eq('id', cfg.rowId).maybeSingle();
    if (pullErr) throw pullErr;
    const base = (current && current.state) ? normalizeState(current.state) : normalizeState(localState);
    // 2) Append only our brand-new orders that aren't on the server yet.
    const localOrders = (localState && Array.isArray(localState.orders)) ? localState.orders : [];
    const present = new Set((base.orders || []).map((o) => o.id));
    const newOnes = localOrders.filter((o) => ids.includes(o.id) && !present.has(o.id));
    const merged = { ...base, orders: [...(base.orders || []), ...newOnes] };
    // 3) Push the merged state.
    await pushRemoteState(merged);
    // 4) Read back and verify our ids are really there.
    const { data, error } = await client
      .from(cfg.table).select('state').eq('id', cfg.rowId).maybeSingle();
    if (error) throw error;
    const remoteOrders = (data && data.state && Array.isArray(data.state.orders)) ? data.state.orders : [];
    const have = new Set(remoteOrders.map((o) => o.id));
    const missing = ids.filter((id) => !have.has(id));
    return { ok: missing.length === 0, missing, reason: missing.length ? 'missing' : 'ok' };
  }

  function subscribeRemoteState(onState, onError) {
    const client = remoteClient();
    const cfg = remoteConfig();
    if (!client) return () => {};
    const channel = client
      .channel(`ctrls-${cfg.table}-${cfg.rowId}`)
      .on(
        'postgres_changes',
        { event: '*', schema: 'public', table: cfg.table, filter: `id=eq.${cfg.rowId}` },
        (payload) => {
          if (payload?.new?.state) onState(payload.new.state);
        }
      )
      .subscribe((status, err) => {
        if (err && onError) onError(err);
        if (status === 'CHANNEL_ERROR' && onError) onError(new Error('Supabase realtime channel error'));
      });
    return () => { client.removeChannel(channel); };
  }

  // === Date helpers ===
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function isoToday() {
    const d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function isoDate(d) {
    const dd = new Date(d);
    return dd.getFullYear() + '-' + pad2(dd.getMonth() + 1) + '-' + pad2(dd.getDate());
  }
  function isOpen(state, dateIso) {
    if (state.openDates && state.openDates.includes(dateIso)) return true;
    if (state.closedDates && state.closedDates.includes(dateIso)) return false;
    const dow = new Date(dateIso + 'T00:00:00').getDay();
    return state.openDays.includes(dow);
  }
  function orderCutoffForDate(dateIso) {
    const cutoff = new Date(dateIso + 'T00:00:00');
    cutoff.setDate(cutoff.getDate() - 1);
    cutoff.setHours(23, 59, 0, 0);
    return cutoff;
  }
  function canOrderDate(state, dateIso, now = Date.now()) {
    return isOpen(state, dateIso) && now < orderCutoffForDate(dateIso).getTime();
  }
  function addMonths(iso, n) {
    const d = new Date(iso + 'T00:00:00');
    const m = d.getMonth() + n;
    d.setMonth(m);
    return isoDate(d);
  }
  function daysBetween(aIso, bIso) {
    const a = new Date(aIso + 'T00:00:00');
    const b = new Date(bIso + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }

  function menuById(state, id) { return (state.signatureMenu || DEFAULT_SIGNATURE_MENU).find((x) => x.id === id); }
  function asapById(state, id) { return state.asap.find((x) => x.id === id); }
  function priceForItem(state, item) {
    const ref = item.type === 'menu' ? menuById(state, item.refId) : asapById(state, item.refId);
    return (ref ? ref.price : 0) * (item.qty || 1);
  }
  function outOfTeamSurcharge(state) { return state.barista?.outOfTeamSurcharge ?? 20; }
  // Per-item price as the customer should SEE it — out-of-team folks pay the
  // per-cup surcharge, so fold it into the displayed price (matches orderTotal).
  function customerItemPrice(state, item, profile) {
    return priceForItem(state, item) + (profile?.outOfTeam ? outOfTeamSurcharge(state) * (item.qty || 1) : 0);
  }
  function orderTotal(state, order) {
    const base = order.items.reduce((s, it) => s + priceForItem(state, it), 0);
    // Out-of-team orderers pay a per-cup surcharge (snapshotted on the order).
    const extra = order.outOfTeam ? outOfTeamSurcharge(state) * cupQty(order) : 0;
    return base + extra;
  }
  function itemRoast(itemOrDrink) { return itemOrDrink?.roast || 'medium'; }
  function isAvailable(itemOrDrink) { return itemOrDrink?.available !== false; }
  function subscriptionCandidatesForTemplate(state, item) {
    if (!item) return [];
    if (item.type === 'random') {
      return (state.asap || [])
        .filter((a) => isAvailable(a) && itemRoast(a) === item.roast)
        .map((a) => ({ type: 'asap', refId: a.id, qty: item.qty || 1 }));
    }
    const ref = item.type === 'menu' ? menuById(state, item.refId) : asapById(state, item.refId);
    return ref && isAvailable(ref) ? [{ ...item, qty: item.qty || 1 }] : [];
  }
  function subscriptionTemplateAvailable(state, item) {
    return subscriptionCandidatesForTemplate(state, item).length > 0;
  }
  function isConfirmedOrder(order) {
    return Boolean(order && order.status !== 'cancelled' && order.paid !== 'cancelled');
  }
  function orderBelongsToProfile(order, profile) {
    if (!order || !profile) return false;
    return (order.profileId && order.profileId === profile.id) || order.name === profile.name;
  }
  function cupQty(order) {
    return (order?.items || []).reduce((s, it) => s + (it.qty || 1), 0);
  }
  function cupCountForProfile(state, profile) {
    return (state.orders || [])
      .filter((o) => isConfirmedOrder(o) && orderBelongsToProfile(o, profile))
      .reduce((s, o) => s + cupQty(o), 0);
  }
  function itemLabel(state, item) {
    const ref = item.type === 'menu' ? menuById(state, item.refId) : asapById(state, item.refId);
    return ref ? ref.name : '?';
  }
  function itemColor(state, item) {
    if (item.type === 'menu') return menuById(state, item.refId)?.color || 'mustard';
    return 'terracotta';
  }

  // === Profile / multi-profile fake server ===
  // We keep a per-device "active code" pointer, and the actual profiles live in
  // state.profiles keyed by code. This way the SAME tab can simulate a transfer
  // by switching the active pointer to another code.
  const ACTIVE_CODE_KEY = 'ctrls_active_code_v1';
  const LOCAL_PROFILE_KEY = 'ctrls_profile_v1'; // legacy single-profile fallback

  function activeCode() {
    try { return localStorage.getItem(ACTIVE_CODE_KEY) || null; } catch { return null; }
  }
  function setActiveCode(code) {
    try { if (code) localStorage.setItem(ACTIVE_CODE_KEY, code); else localStorage.removeItem(ACTIVE_CODE_KEY); } catch {}
  }
  function genCode() {
    // Friendly 6-char code: CAT-XXX where X is alphanumeric (no confusable chars).
    const chars = 'ACDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    for (let i = 0; i < 4; i++) out += chars[Math.floor(Math.random() * chars.length)];
    return 'CAT-' + out;
  }

  const DEFAULT_AVATAR = { body: 'beige', pattern: 'solid', accent: 'mustard', eyeColor: 'black', expression: 'happy', hat: 'none', face: 'none', neck: 'none', hand: 'none', aura: 'none' };

  // Which slot each accessory belongs to (for migrating legacy single-prop avatars).
  const PROP_SLOT = {
    headband: 'hat', beret: 'hat', beanie: 'hat', cap: 'hat', flower: 'hat', bucket: 'hat',
    headphones: 'hat', tophat: 'hat', layers: 'hat', crown: 'hat', 'party-hat': 'hat', halo: 'hat', wizard: 'hat',
    glasses: 'face', sunglasses: 'face', monocle: 'face', eyepatch: 'face',
    bow: 'neck', collar: 'neck', scarf: 'neck', bowtie: 'neck', necktie: 'neck', bandana: 'neck',
    coffee: 'hand', pencil: 'hand', boba: 'hand', balloon: 'hand', eyedropper: 'hand', fish: 'hand',
    cursor: 'aura', pentool: 'aura', 'sparkle-aura': 'aura', rainbow: 'aura', 'cmd-key': 'aura',
  };

  // Migrate an avatar to the slot-based shape (moves legacy `prop` into its slot).
  function normalizeAvatar(av) {
    const a = { ...DEFAULT_AVATAR, ...(av || {}) };
    if (av && av.prop && av.prop !== 'none') {
      const slot = PROP_SLOT[av.prop];
      if (slot && (!a[slot] || a[slot] === 'none')) a[slot] = av.prop;
    }
    delete a.prop;
    return a;
  }

  function newProfile(name, existingCodes = []) {
    let code; do { code = genCode(); } while (existingCodes.includes(code));
    return {
      id: code,
      code,
      name: name || '',
      cupCount: 0,
      joinedAt: Date.now(),
      orderIds: [],
      avatar: { ...DEFAULT_AVATAR },
      stats: { firstOrderDate: null },
      outOfTeam: false,
      lineId: '',
    };
  }

  // Helpers to read/write the active profile from the shared store.
  function getActiveProfile(state) {
    const code = activeCode();
    if (!code) {
      // legacy migration: maybe there's an old single-profile in localStorage
      try {
        const raw = localStorage.getItem(LOCAL_PROFILE_KEY);
        if (raw) {
          const p = JSON.parse(raw);
          // migrate into shared store
          const migrated = {
            ...newProfile(p.name || 'You'),
            cupCount: p.cupCount || 0,
            joinedAt: p.joinedAt || Date.now(),
            orderIds: p.orderIds || [],
            avatar: p.avatar || { ...DEFAULT_AVATAR },
          };
          state.profiles = { ...(state.profiles || {}), [migrated.code]: migrated };
          save(state);
          setActiveCode(migrated.code);
          localStorage.removeItem(LOCAL_PROFILE_KEY);
          return migrated;
        }
      } catch {}
      return null;
    }
    const found = (state.profiles || {})[code] || null;
    if (!found) return null;
    const cupsFromOrders = cupCountForProfile(state, found);
    const orderIds = (state.orders || [])
      .filter((o) => isConfirmedOrder(o) && orderBelongsToProfile(o, found))
      .map((o) => o.id);
    return {
      ...found,
      cupCount: Math.max(found.cupCount || 0, cupsFromOrders),
      orderIds: Array.from(new Set([...(found.orderIds || []), ...orderIds])),
    };
  }

  function upsertProfile(state, profile) {
    return {
      ...state,
      profiles: { ...(state.profiles || {}), [profile.code]: profile },
    };
  }

  function profileByCode(state, code) {
    return (state.profiles || {})[code] || null;
  }

  // Rank ladder
  const RANKS = [
    { key: 'newfile', label: 'CTRL+N', sub: 'new file',       min: 0,   icon: '⌘N', badge: null },
    { key: 'copy',    label: 'CTRL+C', sub: 'copy that',      min: 10,  icon: '⌘C', badge: null },
    { key: 'paste',   label: 'CTRL+V', sub: 'sticky regular', min: 30,  icon: '⌘V', badge: null },
    { key: 'undo',    label: 'CTRL+Z', sub: 'second guess',   min: 70,  icon: '⌘Z', badge: 'ring' },
    { key: 'save',    label: 'CTRL+S', sub: 'committed',      min: 150, icon: '⌘S', badge: 'crown' },
  ];

  // Avatar items unlocked per rank (cumulative — each tier adds to all previous)
  // Avatar items unlocked per rank (cumulative — each tier adds to all previous).
  // Only items that actually render in cat-svgs.jsx are listed.
  const RANK_UNLOCKS = {
    newfile: {
      body:       ['cream', 'beige', 'sand'],
      pattern:    ['solid', 'tabby'],
      accent:     ['mustard', 'pink'],
      eyeColor:   ['black', 'brown'],
      expression: ['happy', 'closed', 'sleepy'],
      hat:        ['none', 'headband'],
      face:       ['none', 'glasses'],
      neck:       ['none', 'bow', 'collar'],
      hand:       ['none', 'coffee'],
      aura:       ['none'],
    },
    copy: {
      body:       ['caramel', 'rosy'],
      pattern:    ['gray-tabby'],
      accent:     ['terracotta'],
      eyeColor:   ['blue'],
      expression: ['wink', 'sparkle', 'shy'],
      hat:        ['beret', 'beanie', 'cap'],
      face:       ['sunglasses'],
      neck:       ['scarf', 'bowtie'],
      hand:       ['pencil', 'boba'],
      aura:       [],
    },
    paste: {
      body:       ['mint', 'sky'],
      pattern:    ['calico', 'tortie'],
      accent:     ['sage'],
      eyeColor:   ['green', 'amber'],
      expression: ['heart', 'lol', 'smug'],
      hat:        ['flower', 'bucket'],
      face:       ['monocle'],
      neck:       ['necktie', 'bandana'],
      hand:       ['balloon', 'eyedropper'],
      aura:       ['cursor'],
    },
    undo: {
      body:       [],
      pattern:    ['cow', 'tuxedo'],
      accent:     ['plum'],
      eyeColor:   ['violet'],
      expression: ['star', 'grumpy'],
      hat:        ['headphones', 'tophat', 'layers'],
      face:       ['eyepatch'],
      neck:       [],
      hand:       ['fish'],
      aura:       ['pentool'],
    },
    save: {
      body:       ['charcoal'],
      pattern:    ['siamese'],
      accent:     ['navy'],
      eyeColor:   [],
      expression: ['shocked', 'star-pulse', 'heart-float'],
      hat:        ['crown', 'party-hat', 'halo', 'wizard'],
      face:       [],
      neck:       [],
      hand:       [],
      aura:       ['sparkle-aura', 'rainbow', 'cmd-key'],
    },
  };

  const RANK_ORDER = ['newfile', 'copy', 'paste', 'undo', 'save'];
  const UNLOCK_CATEGORIES = ['body', 'pattern', 'accent', 'eyeColor', 'expression', 'hat', 'face', 'neck', 'hand', 'aura'];

  function unlocksFor(cupCount) {
    const rank = rankFor(cupCount);
    const idx = RANK_ORDER.indexOf(rank.key);
    const out = {};
    for (const k of UNLOCK_CATEGORIES) out[k] = [];
    for (let i = 0; i <= idx; i++) {
      const tier = RANK_UNLOCKS[RANK_ORDER[i]];
      for (const k of UNLOCK_CATEGORIES) out[k] = [...out[k], ...(tier[k] || [])];
    }
    return out;
  }

  // Every avatar item across all ranks — used to give the owner full access.
  function allUnlocks() {
    const out = {};
    for (const k of UNLOCK_CATEGORIES) out[k] = [];
    for (const key of RANK_ORDER) {
      const tier = RANK_UNLOCKS[key];
      for (const k of UNLOCK_CATEGORIES) out[k] = [...out[k], ...(tier[k] || [])];
    }
    return out;
  }

  // The owner = anyone who has unlocked barista mode on this device (knows the PIN).
  // They get every prop unlocked so their café cat can be a styling mannequin.
  function isOwnerDevice() {
    try { return localStorage.getItem('ctrls_owner') === '1'; } catch { return false; }
  }
  function unlocksForProfile(cupCount) {
    return isOwnerDevice() ? allUnlocks() : unlocksFor(cupCount);
  }

  function rankFor(cupCount) {
    let r = RANKS[0];
    for (const x of RANKS) if (cupCount >= x.min) r = x;
    return r;
  }
  function nextRank(cupCount) {
    return RANKS.find((r) => r.min > cupCount) || null;
  }

  // === Subscription billing ===
  // sub: {
  //   id, profileId, name, days: [dow], itemTemplate: { [dow]: item },
  //   active, startDate (iso), nextBillDate (iso), monthlyBilled (boolean),
  //   billingHistory: [{ date, amount, period }]
  // }
  function expandSubscription(state, sub, fromIso, toIso) {
    const out = [];
    const start = new Date(fromIso + 'T00:00:00');
    const end = new Date(toIso + 'T00:00:00');
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      const iso = isoDate(d);
      const dow = d.getDay();
      if (!sub.days.includes(dow)) continue;
      if (!isOpen(state, iso)) continue;
      const tpl = sub.itemTemplate[dow];
      if (!tpl) continue;
      if (!subscriptionTemplateAvailable(state, tpl)) continue;
      out.push({ date: iso, item: tpl });
    }
    return out;
  }

  // Calculate next 30 days of items from this sub (for monthly billing preview).
  function previewMonthlyForSub(state, sub, fromIso) {
    const from = fromIso || isoToday();
    const to = addMonths(from, 1);
    const expanded = expandSubscription(state, sub, from, to);
    let total = 0;
    for (const { item } of expanded) {
      let price = 0;
      if (item.type === 'random') {
        // estimate using average price at that roast
        const candidates = subscriptionCandidatesForTemplate(state, item);
        price = candidates.length ? Math.round(candidates.reduce((s, candidate) => s + priceForItem(state, candidate), 0) / candidates.length) : 0;
      } else {
        price = priceForItem(state, item);
      }
      total += price;
    }
    return { total, cups: expanded.length, from, to };
  }

  // Day-of-week labels
  const DOW_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
  const DOW_EN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const DOW_EN_SHORT = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

  window.CTRLS = {
    STORAGE_KEY, ACTIVE_CODE_KEY,
    DEFAULT_SIGNATURE_MENU, DEFAULT_ASAP, DEFAULT_OPEN_DAYS,
    DEFAULT_AVATAR, normalizeAvatar, PROP_SLOT,
    COLOR_OPTIONS, ROAST_ORDER, ROAST_OPTIONS, RANKS, RANK_UNLOCKS, RANK_ORDER, UNLOCK_CATEGORIES, unlocksFor, allUnlocks, isOwnerDevice, unlocksForProfile,
    DOW_TH, DOW_EN, DOW_EN_SHORT,
    load, save, isoToday, isoDate, isOpen, orderCutoffForDate, canOrderDate, addMonths, daysBetween,
    remoteConfig, remoteEnabled, pullRemoteState, pushRemoteState, confirmOrders, subscribeRemoteState, adoptRemoteState,
    menuById, asapById, priceForItem, customerItemPrice, orderTotal, outOfTeamSurcharge, itemRoast, isAvailable, subscriptionCandidatesForTemplate, subscriptionTemplateAvailable, isConfirmedOrder, orderBelongsToProfile, cupQty, cupCountForProfile, itemLabel, itemColor,
    activeCode, setActiveCode, genCode, newProfile,
    getActiveProfile, upsertProfile, profileByCode,
    rankFor, nextRank,
    expandSubscription, previewMonthlyForSub,
    reset: () => {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(ACTIVE_CODE_KEY);
      localStorage.removeItem(LOCAL_PROFILE_KEY);
    },
  };
})();

</script>
<script type="text/babel">
// Tiny doodle-style cat SVGs as React components.
// CatBase is highly configurable: body color, accent (ear/blush), eyes (color & expression),
// and an optional prop (hat / glasses / etc.).

const EXPRESSIONS = [
  'sparkle', 'happy', 'sleepy', 'star',
  'wink', 'heart', 'closed', 'lol',
  'shy', 'grumpy', 'smug', 'shocked',
  // CTRL+S animated
  'star-pulse', 'heart-float',
];

// Body silhouette — shared by the fill and the pattern clip-path.
const BODY_PATH = "M 22 58 C 18 50, 20 38, 26 32 L 30 24 L 38 32 C 44 30, 56 30, 62 32 L 70 24 L 74 32 C 80 38, 82 50, 78 58 C 80 66, 76 78, 70 80 L 30 80 C 24 78, 20 66, 22 58 Z";

// Coat patterns — overlaid on the body color, clipped to the silhouette.
const PATTERNS = ['solid', 'tabby', 'gray-tabby', 'calico', 'tortie', 'cow', 'tuxedo', 'siamese'];

// Accessories grouped by body slot — one item per slot can be worn at once.
const HATS  = ['none', 'headband', 'beret', 'beanie', 'cap', 'flower', 'bucket', 'headphones', 'tophat', 'layers', 'crown', 'party-hat', 'halo', 'wizard'];
const FACES = ['none', 'glasses', 'sunglasses', 'monocle', 'eyepatch'];
const NECKS = ['none', 'bow', 'collar', 'scarf', 'bowtie', 'necktie', 'bandana'];
const HANDS = ['none', 'coffee', 'pencil', 'boba', 'balloon', 'eyedropper', 'fish'];
const AURAS = ['none', 'cursor', 'pentool', 'sparkle-aura', 'rainbow', 'cmd-key'];

const SLOTS = [
  { key: 'hat',  label: 'hat',  items: HATS },
  { key: 'face', label: 'face', items: FACES },
  { key: 'neck', label: 'neck', items: NECKS },
  { key: 'hand', label: 'item', items: HANDS },
  { key: 'aura', label: 'aura', items: AURAS },
];

// Flat list of every accessory (legacy + full set).
const PROPS = ['none', ...HATS.slice(1), ...FACES.slice(1), ...NECKS.slice(1), ...HANDS.slice(1), ...AURAS.slice(1)];

const BODY_COLORS = [
  { id: 'cream',     fill: '#F6F1E8' },
  { id: 'beige',     fill: '#EADFCB' },
  { id: 'sand',      fill: '#D9C49E' },
  { id: 'caramel',   fill: '#B8895A' },
  { id: 'rosy',      fill: '#F0CBC2' },
  { id: 'mint',      fill: '#CDE0CC' },
  { id: 'sky',       fill: '#C6D4E2' },
  { id: 'charcoal',  fill: '#3A3A3A' },
];

const ACCENT_COLORS = [
  { id: 'mustard',    fill: '#D5A23B' },
  { id: 'terracotta', fill: '#C97B5F' },
  { id: 'pink',       fill: '#E7A2AC' },
  { id: 'sage',       fill: '#8FA287' },
  { id: 'plum',       fill: '#9F6B8B' },
  { id: 'navy',       fill: '#3C5878' },
];

const EYE_COLORS = [
  { id: 'black',  fill: '#2B2B2B' },
  { id: 'brown',  fill: '#6B4E3D' },
  { id: 'blue',   fill: '#3C5878' },
  { id: 'green',  fill: '#5E8050' },
  { id: 'amber',  fill: '#C97B2F' },
  { id: 'violet', fill: '#7B5B8E' },
];

const CatBase = ({
  size = 80,
  fill = '#F6F1E8',           // body color
  stroke = '#2B2B2B',          // outline (also default eye color)
  accent = '#D5A23B',          // ear inner + cheek blush
  eyeColor,                    // overrides stroke for eye fill
  expression = 'sparkle',
  prop = 'none',               // legacy single accessory
  hat = 'none',
  face = 'none',
  neck = 'none',
  hand = 'none',
  aura = 'none',
  pattern = 'solid',
  bg = 'transparent',
}) => {
  const isDark = fill === '#3A3A3A' || fill === '#2B2B2B';
  // Dark body: switch outline + eyes to light cream so they're visible.
  const out = isDark ? '#E8E0D4' : stroke;
  const DARK_EYE_COLORS = ['#2B2B2B', '#1A1A1A', '#3A3A3A', '#6B4E3D'];
  const eye = isDark
    ? (eyeColor && !DARK_EYE_COLORS.includes(eyeColor) ? eyeColor : '#E8E0D4')
    : (eyeColor || stroke);

  // Merge every worn accessory (slots + legacy prop) into one active set.
  const activeProps = [hat, face, neck, hand, aura, prop].filter((p) => p && p !== 'none');
  const has = (n) => activeProps.includes(n);

  const uidRef = React.useRef(null);
  if (!uidRef.current) uidRef.current = Math.random().toString(36).slice(2, 8);
  const clipId = 'catclip-' + uidRef.current;

  return (
    <svg width={size} height={size} viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      {/* body — wobbly outline */}
      <path
        d={BODY_PATH}
        fill={fill}
        stroke={out}
        strokeWidth="1.5"
        strokeLinejoin="round"
      />

      {/* === Coat pattern (clipped to body) === */}
      {pattern && pattern !== 'solid' && (
        <>
          <defs><clipPath id={clipId}><path d={BODY_PATH} /></clipPath></defs>
          <g clipPath={`url(#${clipId})`}>
            {(pattern === 'tabby' || pattern === 'gray-tabby') && (() => {
              const c = pattern === 'tabby' ? '#B5703A' : '#6E6E6E';
              return (

function formatBaht(n) { return Math.round(n).toLocaleString('en-US'); }
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function isoFromDate(d) {
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function shortDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return {
    dow: CTRLS.DOW_EN[d.getDay()].toUpperCase(),
    day: d.getDate(),
    mon: d.toLocaleString('en', { month: 'short' }).toUpperCase(),
    monLong: d.toLocaleString('en', { month: 'long' }),
    year: d.getFullYear(),
  };
}
function nextNDays(n, from) {
  const out = [];
  const base = from ? new Date(from + 'T00:00:00') : new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(base);
    d.setDate(base.getDate() + i);
    out.push(isoFromDate(d));
  }
  return out;
}
function monthMatrix(year, month) {
  // month 0-indexed. Returns 6 rows × 7 cells of {iso, day, otherMonth}.
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(year, month, 1 - startDow + i);
    cells.push({
      iso: isoFromDate(d),
      day: d.getDate(),
      otherMonth: d.getMonth() !== month,
    });
  }
  return cells;
}

async function copyText(text) {
  try {
    if (navigator.clipboard?.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch {}
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    return true;

}

function _crc16(str) {
  let crc = 0xFFFF;
  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
  }

}
function _emv(tag, val) { return tag + String(val.length).padStart(2, '0') + val; }

function buildPromptPayPayload(id, amount) {
  let norm = (id || '').replace(/[-\s]/g, '');
  if (/^0\d{9}$/.test(norm))  norm = '0066' + norm.slice(1);
  else if (/^\+66/.test(norm)) norm = '00' + norm.slice(1);
  const acct = _emv('00', 'A000000677010111') + _emv('01', norm);
  let p = _emv('00','01') + _emv('01','12') + _emv('29', acct)
        + _emv('52','0000') + _emv('53','764');
  if (amount > 0) p += _emv('54', amount.toFixed(2));
  p += _emv('58','TH') + _emv('59','CTRL S Coffee') + _emv('60','Bangkok') + '6304';
  return p + _crc16(p).toString(16).toUpperCase().padStart(4,'0');
}

      const payload = buildPromptPayPayload(promptPayId, amount);
      QRCode.toDataURL(payload, { width: size, margin: 1, color: { dark: '#2B2B2B', light: '#F6F1E8' } })
        .then((url) => { if (!cancelled) setSrc(url); })
        .catch(() => {});
    }
    tryGenerate(0);
    return () => { cancelled = true; };
  }, [promptPayId, amount, size]);
  if (!src) return (
    <div style={{ width: size, height: size, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'var(--beige)', borderRadius: 12, gap: 6 }}>
      <div style={{ fontSize: 24 }}>⏳</div>
      <span className="mono dim" style={{ fontSize: 10 }}>generating QR…</span>
    </div>
  );
  return <img src={src} width={size} height={size} alt="PromptPay QR" style={{ borderRadius: 12, imageRendering: 'pixelated' }} />;
}

function CafeLounge({ state, selectedDate, profile }) {
  const patrons = _umC(() => {
    const byPerson = {};
    (state.orders || []).forEach((o) => {
      if (!CTRLS.isConfirmedOrder(o) || o.date !== selectedDate) return;
      const key = o.profileId || o.name || 'someone';
      if (!byPerson[key]) {
        byPerson[key] = { key, name: o.name || 'someone', avatar: o.avatar, cups: 0, ts: o.ts || 0 };
      }
      byPerson[key].cups += (o.items || []).length;
      // keep the most recent avatar
      if ((o.ts || 0) >= byPerson[key].ts) { byPerson[key].avatar = o.avatar; byPerson[key].ts = o.ts || 0; }
    });
    return Object.values(byPerson).sort((a, b) => a.ts - b.ts);
  }, [state.orders, selectedDate]);

  // The owner/you are always present in the café — standing by the counter even
  // without an order that day (also doubles as a showcase for your avatar props).
  const meHasOrder = patrons.some((p) => p.key === profile.id || p.name === profile.name);

            return (
              <div

                title={`${p.name} · ${p.cups} cup${p.cups !== 1 ? 's' : ''}`}

  const threshold = state.barista?.beanLoveThreshold || 8;

  const missed = (state.asap || []).filter((a) => !CTRLS.isAvailable(a));
  if (!missed.length) return null;

  function toggleVote(id) {
    setState((s) => {
      const bl = { ...(s.beanLove || {}) };
      const voters = new Set(bl[id] || []);
      if (voters.has(profile.id)) voters.delete(profile.id); else voters.add(profile.id);
      bl[id] = [...voters];
      return { ...s, beanLove: bl };

    <div className="section missed-section">
      <div className="daypicker-head" style={{ marginBottom: 2 }}>
        <span className="mono dim">sold out · 💭 miss one?</span>

      </div>
      {missed.map((a) => {
        const voters = beanLove[a.id] || [];
        const voted = voters.includes(profile.id);
        const pct = Math.min(100, Math.round((voters.length / threshold) * 100));
        return (
          <div key={a.id} className="missed-bean">
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="h-hand missed-name" style={{ fontSize: 15 }}>{a.name} <span className="missed-tag mono">sold out</span></div>
              <div className="missed-bar"><div className="missed-fill" style={{ width: pct + '%' }} /></div>
              <div className="mono dim" style={{ fontSize: 10 }}>{voters.length}/{threshold} want it back{voters.length >= threshold ? ' · 🎉 restocking soon!' : ''}</div>

function GiftNotificationSheet({ gift, state, profile, onClaim, onDismiss }) {
  const [picked, setPicked] = _usC(null);
  const [catDecide, setCatDecide] = _usC(false);

  const itemsAtTier = _umC(() => {
    const sig = (state.signatureMenu || CTRLS.DEFAULT_SIGNATURE_MENU).filter((m) => CTRLS.isAvailable(m) && m.price === gift.tier);
    const asap = state.asap.filter((a) => CTRLS.isAvailable(a) && a.price === gift.tier);
    return [
      ...sig.map((m) => ({ type: 'menu', refId: m.id, label: m.name })),
      ...asap.map((a) => ({ type: 'asap', refId: a.id, label: a.name })),
    ];
  }, [gift.tier, state]);

  function claim() {
    let item = catDecide || !picked
      ? itemsAtTier[Math.floor(Math.random() * itemsAtTier.length)]
      : picked;
    if (!item) return;
    let date = CTRLS.isoToday();

        if (CTRLS.canOrderDate(state, iso)) { date = iso; break; }

    onClaim(gift, { type: item.type, refId: item.refId, qty: 1 }, date);

  const shopClosed = !CTRLS.isOpen(state, selectedDate);

// === Edit-order sheet ===
function EditOrderSheet({ order, state, setState, profile, setProfile, onClose }) {
  const [items, setItems] = _usP(order.items);
  const [picking, setPicking] = _usP(null);

  const origTotal = order.items.reduce((s, it) => s + CTRLS.priceForItem(state, it), 0);
  const newTotal = items.reduce((s, it) => s + CTRLS.priceForItem(state, it), 0);
  const diff = newTotal - origTotal;

  function swapAt(idx, newRef) {
    if (newRef === null) {
      setItems((arr) => arr.filter((_, i) => i !== idx));

      setItems((arr) => arr.map((it, i) => i === idx ? newRef : it));

    setPicking(null);

  function save() {
    if (items.length === 0) {
      setState({ ...state, orders: state.orders.filter((o) => o.id !== order.id) });
      onClose();
      return;

    setState({ ...state, orders: state.orders.map((o) => o.id === order.id ? { ...o, items, ts: o.ts } : o) });
    onClose();

            <div className="row"><span className="mono dim">new</span><span className="mono">฿{formatBaht(newTotal)}</span></div>
            <div className="row diff">
              <span className="h-hand">{diff === 0 ? 'no change' : diff > 0 ? 'pay ฿' + formatBaht(diff) + ' more to barista' : '฿' + formatBaht(Math.abs(diff)) + ' cheaper'}</span>
              <span className={`v ${diff > 0 ? 'pos' : diff < 0 ? 'neg' : ''}`}>{diff === 0 ? '–' : (diff > 0 ? '+' : '−') + '฿' + formatBaht(Math.abs(diff))}</span>
            </div>
          </div>
        </div>
        <div className="sheet-foot">
          <button className="btn-primary" onClick={save}>save changes →</button>
        </div>
      </div>

}

function SubsTab({ subs, state, setState, profile, onNew, onEdit }) {

    setState({
      ...state,
      subscriptions: state.subscriptions.map((s) => s.id === id ? { ...s, active: !s.active } : s),
    });
  }
  function remove(id) {
    setState({ ...state, subscriptions: state.subscriptions.filter((s) => s.id !== id) });
  }
  if (subs.length === 0) {
    return (
      <div className="sub-stack">
        <div className="sub-empty">
          <div className="h-doodle">no subscription yet</div>

        <div className="mono dim" style={{ fontSize: 10, padding: '0 4px', lineHeight: 1.5 }}>

    );

  return (
    <div className="sub-stack">

}

function SubCard({ sub, state, onEdit, onToggle, onDelete }) {
  const dowShort = ['S','M','T','W','T','F','S'];
  const preview = CTRLS.previewMonthlyForSub(state, sub);
  const startSD = sub.startDate ? shortDate(sub.startDate) : null;
  const nextBillSD = sub.nextBillDate ? shortDate(sub.nextBillDate) : null;
  const hasSkippedItems = sub.days.some((dow) => sub.itemTemplate[dow] && !CTRLS.subscriptionTemplateAvailable(state, sub.itemTemplate[dow]));
  return (

// === Subscription editor (used from profile + main page) ===
function SubEditSheet({ sub, state, setState, profile, onClose }) {
  const isNew = !sub;
  const [name, setName] = _usP(sub?.name || 'my weekly');
  const [days, setDays] = _usP(sub?.days || [1, 3, 5]);
  const [tpl, setTpl] = _usP(sub?.itemTemplate || {});
  const [picking, setPicking] = _usP(null);

  function setDow(dow, on) {
    setDays((cur) => {
      const next = on ? [...new Set([...cur, dow])] : cur.filter((d) => d !== dow);
      return next.sort();
    });
  }
  function save() {
    const startDate = sub?.startDate || CTRLS.isoToday();
    const newSub = {
      id: sub?.id || ('s' + Date.now().toString(36)),
      profileId: profile.id,
      name,
      days,
      itemTemplate: tpl,
      active: sub?.active ?? true,
      startDate,
      nextBillDate: sub?.nextBillDate || CTRLS.addMonths(startDate, 1),
      billingHistory: sub?.billingHistory || [],
    };
    const subs = state.subscriptions || [];
    if (isNew) setState({ ...state, subscriptions: [...subs, newSub] });
    else setState({ ...state, subscriptions: subs.map((s) => s.id === sub.id ? newSub : s) });
    onClose();
  }

  // Preview the monthly cost as user changes things
  const preview = _umP(() => {
    const fakeSub = { days, itemTemplate: tpl };
    return CTRLS.previewMonthlyForSub(state, fakeSub);
  }, [state, days, tpl]);

  const dowLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return (
    <div className="sheet-backdrop" onClick={onClose} style={{ zIndex: 110 }}>
      <div className="sheet" onClick={(e) => e.stopPropagation()} style={{ maxHeight: '90vh' }}>
        <div className="sheet-handle" />
        <div className="sheet-title">
          <span className="h-doodle" style={{ fontSize: 26 }}>{isNew ? 'new subscription' : 'edit subscription'}</span>
          <button className="x-big" onClick={onClose}>×</button>
        </div>
        <div className="sub-edit">
          <input className="name-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="name this subscription" />

          <div>
            <label className="field-label">days of week</label>
            <div className="dow-row" style={{ marginTop: 6 }}>
              {dowLabels.map((l, dow) => (
                <button
                  key={dow}
                  className={`dow-toggle ${days.includes(dow) ? 'on' : 'off'}`}
                  onClick={() => setDow(dow, !days.includes(dow))}
                >
                  {l.slice(0,3).toLowerCase()}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="field-label">what to brew each day</label>
            <div style={{ marginTop: 8 }}>
              {days.length === 0 && <div className="empty mono">pick some days first</div>}
              {days.map((dow) => {
                const cur = tpl[dow];
                let label = 'choose ›';
                if (cur) {
                  if (cur.type === 'random') label = "🎲 cat's pick · " + cur.roast;
                  else label = CTRLS.itemLabel(state, cur);
                }
                const unavailable = cur && !CTRLS.subscriptionTemplateAvailable(state, cur);
                return (
                  <div key={dow} className={`day-template ${unavailable ? 'unavailable' : ''}`}>
                    <span className="dt-label">{dowLabels[dow].slice(0,3).toLowerCase()}</span>
                    <span className="dt-name">{label}{unavailable ? ' · sold out' : ''}</span>
                    <button className="pick-btn" onClick={() => setPicking(dow)}>pick</button>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="edit-diff-box" style={{ marginTop: 4 }}>
            <div className="row"><span className="mono dim">est. monthly</span><span className="h-doodle">฿{formatBaht(preview.total)}</span></div>
            <div className="row mono dim" style={{ fontSize: 10 }}><span>{preview.cups} cups / mo</span><span>billed every {CTRLS.addMonths(CTRLS.isoToday(), 0) ? '1 month' : ''} from start</span></div>
          </div>

          <div className="footnote mono" style={{ padding: 0, justifyContent: 'flex-start' }}>
            ongoing until cancelled · sold-out items are skipped automatically · edit/skip individual days anytime.
          </div>
        </div>
        <div className="sheet-foot">
          <button className="btn-primary" disabled={days.length === 0} onClick={save}>{isNew ? 'start brewing →' : 'save →'}</button>
        </div>

        {picking !== null && (
          <SubItemPicker
            state={state}
            onPick={(item) => { setTpl((t) => ({ ...t, [picking]: item })); setPicking(null); }}
            onClose={() => setPicking(null)}
          />
        )}
      </div>
    </div>
  );
}

// === Avatar customization ===
function RankGate({ unlockedAt, onPreview, children }) {
  const rank = CTRLS.RANKS.find((r) => r.key === unlockedAt);
  return (
    <div className="rank-locked" onClick={onPreview} title={`preview · unlock at ${rank?.label}`} style={{ cursor: 'pointer' }}>
      <div className="rank-locked-inner">{children}</div>
      <div className="rank-locked-overlay">
        <span className="rank-locked-label mono">{rank?.label}</span>
      </div>
    </div>
  );
}

function AvatarTab({ profile, setProfile }) {
  const a = CTRLS.normalizeAvatar(profile.avatar);
  const unlocks = CTRLS.unlocksForProfile(profile.cupCount);
  const rank = CTRLS.rankFor(profile.cupCount);
  const nextRank = CTRLS.nextRank(profile.cupCount);

  const [preview, setPreview] = _usP(null); // { category, item, unlockedAt }
  const timerRef = _urP(null);

  function startPreview(category, item, unlockedAt) {
    if (timerRef.current) clearTimeout(timerRef.current);
    setPreview({ category, item, unlockedAt });
    timerRef.current = setTimeout(() => setPreview(null), 6000);
  }
  function clearPreview() {
    if (timerRef.current) clearTimeout(timerRef.current);
    setPreview(null);
  }

  function patch(p) {
    clearPreview();
    setProfile({ ...profile, avatar: { ...a, ...p } });
  }

  function randomize() {
    const rnd = (arr) => arr[Math.floor(Math.random() * arr.length)];
    patch({
      body: rnd(unlocks.body),
      pattern: rnd(unlocks.pattern),
      accent: rnd(unlocks.accent),
      eyeColor: rnd(unlocks.eyeColor),
      expression: rnd(unlocks.expression),
      hat: rnd(unlocks.hat),
      face: rnd(unlocks.face),
      neck: rnd(unlocks.neck),
      hand: rnd(unlocks.hand),
      aura: rnd(unlocks.aura),
    });
  }

  // Find which rank first unlocks a given item
  function unlockedAtRank(category, item) {
    for (const key of CTRLS.RANK_ORDER) {
      if ((CTRLS.RANK_UNLOCKS[key][category] || []).includes(item)) return key;
    }
    return 'newfile';
  }

  // Preview avatar: overlay the previewed item on real avatar
  const displayAvatar = preview ? { ...a, [preview.category]: preview.item } : a;
  const previewRank = preview ? CTRLS.RANKS.find((r) => r.key === preview.unlockedAt) : null;

  const bodyFill = BODY_COLORS.find((c) => c.id === a.body)?.fill || '#F6F1E8';
  const accentFill = ACCENT_COLORS.find((c) => c.id === a.accent)?.fill || '#D5A23B';
  const eyeFill = EYE_COLORS.find((c) => c.id === a.eyeColor)?.fill;

  return (
    <div className="avatar-tab">
      <div className="avatar-preview">
        <div className="avatar-preview-inner">
          <div className="rank-avatar-wrap" style={{ position: 'relative', flexShrink: 0 }}>
            <CatAvatar avatar={displayAvatar} size={52} />
            {rank.badge === 'ring' && <div className="rank-ring" />}
            {rank.badge === 'crown' && <div className="rank-crown">✦</div>}
            {preview && (
              <div className="avatar-preview-locked-overlay" onClick={clearPreview}>🔒</div>
            )}
          </div>
          <div className="avatar-preview-meta">
            {preview ? (
              <div className="avatar-preview-badge mono" onClick={clearPreview}>
                🔒 locked · {previewRank?.label}<br/>
                <span style={{ fontSize: 9, opacity: 0.7 }}>tap to dismiss · auto-clears in 6s</span>
              </div>
            ) : (
              <>
                <div className="mono" style={{ fontSize: 11 }}>{rank.label} · {profile.cupCount} cups</div>
                {nextRank && <div className="mono dim" style={{ fontSize: 9 }}>{nextRank.min - profile.cupCount} to {nextRank.label}</div>}
              </>
            )}
            <button className="btn-mini" style={{ marginTop: 6 }} onClick={randomize}>🎲 shuffle</button>
          </div>
        </div>
      </div>

      <div className="avatar-section">
        <label className="field-label">expression</label>
        <div className="avatar-grid">
          {EXPRESSIONS.map((exp) => {
            const locked = !unlocks.expression.includes(exp);
            const tier = locked ? unlockedAtRank('expression', exp) : null;
            if (locked) return (
              <RankGate key={exp} unlockedAt={tier} onPreview={() => startPreview('expression', exp, tier)}>
                <CatBase size={48} fill="#EADFCB" stroke="#2B2B2B" expression={exp} accent="#D5A23B" prop="none" />
                <span className="lbl mono">{exp}</span>
              </RankGate>
            );
            return (
              <button key={exp} className={`avatar-cell ${a.expression === exp ? 'on' : ''}`} onClick={() => patch({ expression: exp })}>
                <CatBase size={48} fill={bodyFill} accent={accentFill} eyeColor={eyeFill} stroke="#2B2B2B" expression={exp} prop="none" />
                <span className="lbl mono">{exp}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="avatar-section">
        <label className="field-label">body color</label>
        <div className="avatar-swatch-row">
          {BODY_COLORS.map((c) => {
            const locked = !unlocks.body.includes(c.id);
            const tier = locked ? unlockedAtRank('body', c.id) : null;
            return (
              <button
                key={c.id}
                className={`swatch ${a.body === c.id ? 'on' : ''} ${locked ? 'swatch-locked' : ''}`}
                style={{ background: c.fill, position: 'relative' }}
                onClick={() => locked ? startPreview('body', c.id, tier) : patch({ body: c.id })}
                title={locked ? `preview · unlock at ${CTRLS.RANKS.find(r=>r.key===tier)?.label}` : c.id}
              >
                {locked && <span className="swatch-lock">🔒</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div className="avatar-section">
        <label className="field-label">coat pattern</label>
        <div className="avatar-grid">
          {PATTERNS.map((p) => {
            const locked = !unlocks.pattern.includes(p);
            const tier = locked ? unlockedAtRank('pattern', p) : null;
            if (locked) return (
              <RankGate key={p} unlockedAt={tier} onPreview={() => startPreview('pattern', p, tier)}>
                <CatBase size={48} fill="#EADFCB" stroke="#2B2B2B" expression="happy" accent="#D5A23B" pattern={p} />
                <span className="lbl mono">{p}</span>
              </RankGate>
            );
            return (
              <button key={p} className={`avatar-cell ${a.pattern === p ? 'on' : ''}`} onClick={() => patch({ pattern: p })}>
                <CatBase size={48} fill={bodyFill} accent={accentFill} eyeColor={eyeFill} stroke="#2B2B2B" expression="happy" pattern={p} />
                <span className="lbl mono">{p === 'solid' ? 'plain' : p}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="avatar-section">
        <label className="field-label">ear & blush</label>
        <div className="avatar-swatch-row">
          {ACCENT_COLORS.map((c) => {
            const locked = !unlocks.accent.includes(c.id);
            const tier = locked ? unlockedAtRank('accent', c.id) : null;
            return (
              <button
                key={c.id}
                className={`swatch ${a.accent === c.id ? 'on' : ''} ${locked ? 'swatch-locked' : ''}`}
                style={{ background: c.fill }}
                onClick={() => locked ? startPreview('accent', c.id, tier) : patch({ accent: c.id })}
                title={locked ? `preview · unlock at ${CTRLS.RANKS.find(r=>r.key===tier)?.label}` : c.id}
              >
                {locked && <span className="swatch-lock">🔒</span>}
              </button>
            );
          })}
        </div>
      </div>

      <div className="avatar-section">
        <label className="field-label">eye color</label>
        <div className="avatar-swatch-row">
          {EYE_COLORS.map((c) => {
            const locked = !unlocks.eyeColor.includes(c.id);
            const tier = locked ? unlockedAtRank('eyeColor', c.id) : null;
            return (
              <button
                key={c.id}
                className={`swatch ${a.eyeColor === c.id ? 'on' : ''} ${locked ? 'swatch-locked' : ''}`}
                style={{ background: c.fill }}
                onClick={() => locked ? startPreview('eyeColor', c.id, tier) : patch({ eyeColor: c.id })}
                title={locked ? `preview · unlock at ${CTRLS.RANKS.find(r=>r.key===tier)?.label}` : c.id}
              >
                {locked && <span className="swatch-lock">🔒</span>}
              </button>
            );
          })}
        </div>
      </div>

      {SLOTS.map((slot) => (
        <div className="avatar-section" key={slot.key}>
          <label className="field-label">{slot.label}</label>
          <div className="avatar-grid">
            {slot.items.map((item) => {
              const locked = item !== 'none' && !unlocks[slot.key].includes(item);
              const tier = locked ? unlockedAtRank(slot.key, item) : null;
              const previewProps = { [slot.key]: item };
              if (locked) return (
                <RankGate key={item} unlockedAt={tier} onPreview={() => startPreview(slot.key, item, tier)}>
                  <CatBase size={48} fill="#EADFCB" stroke="#2B2B2B" expression="happy" accent="#D5A23B" {...previewProps} />
                  <span className="lbl mono">{item}</span>
                </RankGate>
              );
              return (
                <button key={item} className={`avatar-cell ${(a[slot.key] || 'none') === item ? 'on' : ''}`} onClick={() => patch({ [slot.key]: item })}>
                  <CatBase size={48} fill={bodyFill} accent={accentFill} eyeColor={eyeFill} stroke="#2B2B2B" expression="happy" pattern={a.pattern} {...previewProps} />
                  <span className="lbl mono">{item === 'none' ? '∅' : item}</span>

function ShareTab({ profile, state }) {

  // Drink counts

  myOrders.forEach((o) => o.items.forEach((it) => {
    const label = CTRLS.itemLabel(state, it);

  }));
  const sortedDrinks = Object.entries(drinkCounts).sort((a, b) => b[1] - a[1]);
  const fav = sortedDrinks[0];
  const uniqueDrinks = sortedDrinks.length;

  // Financials
  const totalSpent = myOrders.reduce((s, o) => s + CTRLS.orderTotal(state, o), 0);
  const avgPerCup = profile.cupCount > 0 ? Math.round(totalSpent / profile.cupCount) : 0;

  // Busiest day of week
  const dowCounts = [0,0,0,0,0,0,0];
  myOrders.forEach((o) => { dowCounts[new Date(o.date + 'T00:00:00').getDay()]++; });
  const busiestDowIdx = dowCounts.indexOf(Math.max(...dowCounts));
  const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Streak (consecutive open days with a paid order going backwards)
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 60; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const iso = isoFromDate(d);
    if (!CTRLS.isOpen(state, iso)) continue;
    if (myOrders.some((o) => o.date === iso)) streak++;
    else if (streak > 0) break;

  // Cups per week since first order
  const firstOrderDate = myOrders.length > 0
    ? myOrders.reduce((min, o) => o.date < min ? o.date : min, myOrders[0].date)

  const weeksSince = firstOrderDate
    ? Math.max(1, Math.ceil((Date.now() - new Date(firstOrderDate + 'T00:00:00')) / (7 * 86400000)))
    : 1;
  const cupsPerWeek = profile.cupCount > 0 ? (profile.cupCount / weeksSince).toFixed(1) : '0.0';

}
